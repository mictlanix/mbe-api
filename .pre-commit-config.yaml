# Install once per clone:  uv run pre-commit install
# Run against everything:  uv run pre-commit run --all-files
#
# pre-commit passes the staged files to each hook, so no path arguments are given
# here; `files` scopes the hooks to the same tree the project lints by hand
# (`ruff check app tests`), leaving migrations/ and scripts/ alone.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with the ruff pin in pyproject.toml's dev dependency group.
    rev: v0.15.17
    hooks:
      - id: ruff-format
        files: ^(app|tests)/
      - id: ruff-check
        args: [--fix]
        files: ^(app|tests)/
